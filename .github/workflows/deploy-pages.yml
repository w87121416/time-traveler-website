name: 发布时光旅人官网

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 官方部署需要读取源码、写入 Pages，并使用 OIDC 完成发布。
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      # 自定义域名直接从根路径访问，不能再拼接仓库名称子路径。
      NEXT_PUBLIC_BASE_PATH: ""
      NEXT_PUBLIC_SITE_URL: https://www.sinbookey.com
    steps:
      - name: 读取官网源码
        uses: actions/checkout@v4

      - name: 准备 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 准备 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 安装依赖
        run: npm ci

      - name: 生成静态网页
        run: npm run build:github

      - name: 上传静态网页
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
